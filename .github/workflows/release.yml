name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.asset_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: universal-apple-darwin
            source_bin_name: robcos-native
            package_bin_name: robcos
            asset_name: macos-universal
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            source_bin_name: robcos-native
            package_bin_name: robcos
            asset_name: linux-x86_64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            source_bin_name: robcos-native
            package_bin_name: robcos
            asset_name: linux-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            source_bin_name: robcos-native.exe
            package_bin_name: robcos.exe
            asset_name: windows-x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
          fetch-tags: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target == 'universal-apple-darwin' && 'aarch64-apple-darwin,x86_64-apple-darwin' || matrix.target }}

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libasound2-dev \
            libudev-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libx11-dev \
            libxi-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libgl1-mesa-dev \
            libegl1-mesa-dev \
            libfontconfig1-dev

      - name: Build release binary
        if: matrix.target != 'universal-apple-darwin'
        run: cargo build --release --target ${{ matrix.target }} -p robcos-native-shell --bin robcos-native

      - name: Build release binary (macOS universal)
        if: matrix.target == 'universal-apple-darwin'
        shell: bash
        run: |
          cargo build --release --target aarch64-apple-darwin -p robcos-native-shell --bin robcos-native
          cargo build --release --target x86_64-apple-darwin -p robcos-native-shell --bin robcos-native

      - name: Package (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          dist_dir="dist/RobCoOS-${{ matrix.asset_name }}"
          app_dir="$dist_dir/RobCoOS.app"
          contents_dir="$app_dir/Contents"
          macos_dir="$contents_dir/MacOS"
          resources_dir="$contents_dir/Resources"
          iconset_dir="$dist_dir/RobCoOS.iconset"

          mkdir -p "$macos_dir" "$resources_dir" "$iconset_dir"
          lipo -create \
            "target/aarch64-apple-darwin/release/${{ matrix.source_bin_name }}" \
            "target/x86_64-apple-darwin/release/${{ matrix.source_bin_name }}" \
            -output "$macos_dir/${{ matrix.package_bin_name }}"
          chmod +x "$macos_dir/${{ matrix.package_bin_name }}"

          cat > "$contents_dir/Info.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleDevelopmentRegion</key>
            <string>en</string>
            <key>CFBundleDisplayName</key>
            <string>RobCoOS</string>
            <key>CFBundleExecutable</key>
            <string>${{ matrix.package_bin_name }}</string>
            <key>CFBundleIconFile</key>
            <string>RobCoOS.icns</string>
            <key>CFBundleIconName</key>
            <string>RobCoOS</string>
            <key>CFBundleIdentifier</key>
            <string>com.stylith.robcoos</string>
            <key>CFBundleInfoDictionaryVersion</key>
            <string>6.0</string>
            <key>CFBundleName</key>
            <string>RobCoOS</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>${{ github.ref_name }}</string>
            <key>CFBundleVersion</key>
            <string>${{ github.run_number }}</string>
            <key>LSMinimumSystemVersion</key>
            <string>12.0</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          PLIST

          for size in 16 32 128 256 512; do
            sips -z "$size" "$size" icon.png --out "$iconset_dir/icon_${size}x${size}.png"
          done
          for size in 16 32 128 256 512; do
            double=$((size * 2))
            sips -z "$double" "$double" icon.png --out "$iconset_dir/icon_${size}x${size}@2x.png"
          done
          iconutil -c icns "$iconset_dir" -o "$resources_dir/RobCoOS.icns"

          cp README.md LICENSE "$dist_dir/"
          (
            cd dist
            ditto -c -k --sequesterRsrc --keepParent "RobCoOS-${{ matrix.asset_name }}" "RobCoOS-${{ matrix.asset_name }}.zip"
          )

      - name: Package (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          version="$(grep '^version = ' Cargo.toml | head -1 | sed -E 's/version = \"([^\"]+)\"/\1/')"
          dist_dir="dist/RobCoOS-${{ matrix.asset_name }}"
          mkdir -p "$dist_dir"
          cp "target/${{ matrix.target }}/release/${{ matrix.source_bin_name }}" "$dist_dir/${{ matrix.package_bin_name }}"
          chmod +x "$dist_dir/${{ matrix.package_bin_name }}"
          cp README.md LICENSE icon.png "$dist_dir/"
          sed "s/__VERSION__/$version/g" packaging/linux/robcos.desktop > "$dist_dir/robcos.desktop"
          (
            cd dist
            zip -r "RobCoOS-${{ matrix.asset_name }}.zip" "RobCoOS-${{ matrix.asset_name }}"
          )

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $distDir = "dist/RobCoOS-${{ matrix.asset_name }}"
          New-Item -ItemType Directory -Force -Path $distDir | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.source_bin_name }}" "$distDir/${{ matrix.package_bin_name }}"
          Copy-Item "README.md" "$distDir/"
          Copy-Item "LICENSE" "$distDir/"
          Copy-Item "icon.png" "$distDir/"
          Compress-Archive -Path "$distDir/*" -DestinationPath "dist/RobCoOS-${{ matrix.asset_name }}.zip" -Force

      - name: Upload zip artifact
        uses: actions/upload-artifact@v6
        with:
          name: zip-${{ matrix.asset_name }}
          path: dist/RobCoOS-${{ matrix.asset_name }}.zip
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
          fetch-tags: true

      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: zip-*
          path: release-assets
          merge-multiple: true

      - name: Build release notes from changelog
        shell: bash
        run: |
          chmod +x scripts/release-notes-from-changelog.sh
          scripts/release-notes-from-changelog.sh "${GITHUB_REF_NAME}" > release-notes.md

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*.zip
          body_path: release-notes.md
          fail_on_unmatched_files: true
          draft: true
          prerelease: ${{ contains(github.ref_name, '-rc.') }}
