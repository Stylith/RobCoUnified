name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.asset_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: universal-apple-darwin
            source_bin_name: robcos-native
            package_bin_name: robcos
            asset_name: macos-universal
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            source_bin_name: robcos-native
            package_bin_name: robcos
            asset_name: linux-x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            source_bin_name: robcos-native
            package_bin_name: robcos
            asset_name: linux-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            source_bin_name: robcos-native.exe
            package_bin_name: robcos.exe
            asset_name: windows-x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target == 'universal-apple-darwin' && 'aarch64-apple-darwin,x86_64-apple-darwin' || matrix.target }}

      - name: Install Linux ARM cross-linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build release binary
        if: matrix.target != 'universal-apple-darwin'
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.target == 'aarch64-unknown-linux-gnu' && 'aarch64-linux-gnu-gcc' || '' }}
        run: cargo build --release --target ${{ matrix.target }} -p robcos-native-shell --bin robcos-native

      - name: Build release binary (macOS universal)
        if: matrix.target == 'universal-apple-darwin'
        shell: bash
        run: |
          cargo build --release --target aarch64-apple-darwin -p robcos-native-shell --bin robcos-native
          cargo build --release --target x86_64-apple-darwin -p robcos-native-shell --bin robcos-native

      - name: Package (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          dist_dir="dist/RobCoOS-${{ matrix.asset_name }}"
          mkdir -p "$dist_dir"
          lipo -create \
            "target/aarch64-apple-darwin/release/${{ matrix.source_bin_name }}" \
            "target/x86_64-apple-darwin/release/${{ matrix.source_bin_name }}" \
            -output "$dist_dir/${{ matrix.package_bin_name }}"
          chmod +x "$dist_dir/${{ matrix.package_bin_name }}"
          cp README.md LICENSE icon.png "$dist_dir/"
          (
            cd dist
            zip -r "RobCoOS-${{ matrix.asset_name }}.zip" "RobCoOS-${{ matrix.asset_name }}"
          )

      - name: Package (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          version="$(grep '^version = ' Cargo.toml | head -1 | sed -E 's/version = \"([^\"]+)\"/\1/')"
          dist_dir="dist/RobCoOS-${{ matrix.asset_name }}"
          mkdir -p "$dist_dir"
          cp "target/${{ matrix.target }}/release/${{ matrix.source_bin_name }}" "$dist_dir/${{ matrix.package_bin_name }}"
          chmod +x "$dist_dir/${{ matrix.package_bin_name }}"
          cp README.md LICENSE icon.png "$dist_dir/"
          sed "s/__VERSION__/$version/g" packaging/linux/robcos.desktop > "$dist_dir/robcos.desktop"
          (
            cd dist
            zip -r "RobCoOS-${{ matrix.asset_name }}.zip" "RobCoOS-${{ matrix.asset_name }}"
          )

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $distDir = "dist/RobCoOS-${{ matrix.asset_name }}"
          New-Item -ItemType Directory -Force -Path $distDir | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.source_bin_name }}" "$distDir/${{ matrix.package_bin_name }}"
          Copy-Item "README.md" "$distDir/"
          Copy-Item "LICENSE" "$distDir/"
          Copy-Item "icon.png" "$distDir/"
          Compress-Archive -Path "$distDir/*" -DestinationPath "dist/RobCoOS-${{ matrix.asset_name }}.zip" -Force

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: zip-${{ matrix.asset_name }}
          path: dist/RobCoOS-${{ matrix.asset_name }}.zip
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: zip-*
          path: release-assets
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*.zip
          body_path: RELEASE_NOTES.md
          fail_on_unmatched_files: true
          prerelease: ${{ contains(github.ref_name, '-rc.') }}
